---
- name: Install git
  hosts: local
  become: true

  tasks:
    - name: Install git
      ansible.builtin.dnf:
        name: git
        state: present

- name: Configure git globals
  hosts: local
  become: false

  tasks:
    - name: Set git user email
      community.general.git_config:
        name: user.email
        scope: global
        value: "{{ git_user_email }}"

    - name: Set git user name
      community.general.git_config:
        name: user.name
        scope: global
        value: "{{ git_user_name }}"
