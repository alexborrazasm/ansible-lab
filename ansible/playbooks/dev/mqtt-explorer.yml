---
- name: Install MQTT Explorer
  hosts: local

  tasks:
    - name: Create Applications directory
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/Applications"
        state: directory
        mode: '0755'

    - name: Download MQTT Explorer AppImage
      ansible.builtin.get_url:
        url: https://github.com/thomasnordquist/MQTT-Explorer/releases/download/v0.4.0-beta.6/MQTT-Explorer-0.4.0-beta.6.AppImage
        dest: "{{ ansible_facts['env']['HOME'] }}/Applications/MQTT-Explorer.AppImage"
        mode: '0755'
