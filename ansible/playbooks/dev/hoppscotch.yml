---
- name: Install Hoppscotch
  hosts: local

  tasks:
    - name: Create Applications directory
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/Applications"
        state: directory
        mode: '0755'

    - name: Download Hoppscotch AppImage
      ansible.builtin.get_url:
        url: https://github.com/hoppscotch/releases/releases/latest/download/Hoppscotch_linux_x64.AppImage
        dest: "{{ ansible_facts['env']['HOME'] }}/Applications/Hoppscotch.AppImage"
        mode: '0755'
